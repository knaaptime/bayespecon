---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  ruff:
    name: Ruff (lint + format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.11"
      - run: ruff check .
      - run: ruff format --check .
